<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת ציוד יומית - מילואים</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 28px 0;
            border-bottom: 2px solid #c0392b;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #1a0a0a 0%, #111 100%);
            border-radius: 16px 16px 0 0;
            margin: -16px -16px 24px -16px;
            padding: 32px 16px 24px 16px;
        }

        header .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        header .logo-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(192,57,43,0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 3s ease-in-out infinite;
        }

        header .logo {
            position: relative;
            width: 140px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(192,57,43,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)) brightness(1.1);
            animation: logoEntry 0.8s ease-out;
            z-index: 1;
        }

        @keyframes logoEntry {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }

        header h1 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .date-display {
            font-size: 1.1rem;
            color: #e74c3c;
            font-weight: 600;
        }

        .declaration {
            background: #1a1a1a;
            border: 1px solid #c0392b;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1rem;
            color: #f5f5f5;
            font-weight: 600;
        }

        .soldier-section {
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
        }

        .soldier-section .field {
            flex: 1;
        }

        .soldier-section label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }

        .soldier-section input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .soldier-section input:focus {
            border-color: #e74c3c;
        }

        .checklist {
            list-style: none;
        }

        .checklist li {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #333;
            user-select: none;
        }

        .checklist li:active {
            transform: scale(0.98);
        }

        .checklist li.checked {
            background: #2d1a1a;
            border-color: #c0392b;
        }

        .checklist li .checkbox {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .checklist li.checked .checkbox {
            background: #c0392b;
            border-color: #c0392b;
        }

        .checklist li.checked .checkbox::after {
            content: '\2713';
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .checklist li .item-name {
            font-size: 1.05rem;
            flex-grow: 1;
        }

        .status-bar {
            text-align: center;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        .status-bar.complete {
            background: #1a2e1a;
            color: #6fcf6f;
            border: 1px solid #3a7a3a;
        }

        .status-bar.neutral {
            background: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
        }

        .status-bar.already-submitted {
            background: #2d2d1a;
            color: #f0c040;
            border: 1px solid #5a5a20;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #c0392b;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:active {
            transform: scale(0.97);
            background: #a93226;
        }

        .submit-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .history-section {
            margin-top: 32px;
            border-top: 2px solid #c0392b;
            padding-top: 20px;
        }

        .history-section h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #aaa;
        }

        .history-entry {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #333;
            font-size: 0.9rem;
        }

        .history-entry .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .history-entry .entry-name {
            color: #e74c3c;
            font-weight: 600;
        }

        .history-entry .entry-time {
            color: #888;
            font-size: 0.8rem;
        }

        .history-entry .entry-items {
            color: #ccc;
        }

        .history-entry .entry-missing {
            color: #e74c3c;
            margin-top: 4px;
        }

        .clear-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.jpeg" alt="YALAK" class="logo">
            </div>
            <h1>בדיקת ציוד יומית</h1>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="declaration">
            הצהרה: ראיתי היום את האמצעים הבאים
        </div>

        <div class="soldier-section">
            <div class="field">
                <label>שם פרטי</label>
                <input type="text" id="firstName" placeholder="שם פרטי">
            </div>
            <div class="field">
                <label>שם משפחה</label>
                <input type="text" id="lastName" placeholder="שם משפחה">
            </div>
        </div>

        <ul class="checklist" id="checklist">
            <li data-item="נשק אישי" onclick="toggleItem(this)">
                <div class="checkbox"></div>
                <span class="item-name">נשק אישי</span>
            </li>
            <li data-item="כוונת השלכה" onclick="toggleItem(this)">
                <div class="checkbox"></div>
                <span class="item-name">כוונת השלכה</span>
            </li>
            <li data-item="אמרל" onclick="toggleItem(this)">
                <div class="checkbox"></div>
                <span class="item-name">אמר"ל</span>
            </li>
            <li data-item="רימון רסס" onclick="toggleItem(this)">
                <div class="checkbox"></div>
                <span class="item-name">רימון רסס</span>
            </li>
            <li data-item="קשר 710" onclick="toggleItem(this)">
                <div class="checkbox"></div>
                <span class="item-name">קשר 710</span>
            </li>
        </ul>

        <div class="status-bar neutral" id="statusBar">
            סמן את הפריטים שברשותך
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitCheck()">שלח הצהרה</button>

        <div class="history-section">
            <h2>דיווחים אחרונים</h2>
            <div id="historyList"></div>
            <button class="clear-btn" onclick="clearHistory()">נקה היסטוריה</button>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        var SCRIPT_URL = '';

        function getTodayKey() {
            var now = new Date();
            return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
        }

        function formatDate() {
            var now = new Date();
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return now.toLocaleDateString('he-IL', options);
        }

        function formatTime() {
            var now = new Date();
            return now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
        }

        document.getElementById('currentDate').textContent = formatDate();

        function hasSubmittedToday() {
            var submitted = localStorage.getItem('lastSubmitDate');
            return submitted === getTodayKey();
        }

        function checkIfAlreadySubmitted() {
            if (hasSubmittedToday()) {
                document.getElementById('statusBar').textContent = 'כבר דיווחת היום';
                document.getElementById('statusBar').className = 'status-bar already-submitted';
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('submitBtn').textContent = 'הדיווח נשלח היום';
            }
        }

        function toggleItem(li) {
            if (hasSubmittedToday()) return;
            li.classList.toggle('checked');
            updateStatus();
        }

        function updateStatus() {
            if (hasSubmittedToday()) return;
            var items = document.querySelectorAll('.checklist li');
            var checked = document.querySelectorAll('.checklist li.checked');
            var statusBar = document.getElementById('statusBar');

            if (checked.length === 0) {
                statusBar.textContent = 'סמן את הפריטים שברשותך';
                statusBar.className = 'status-bar neutral';
            } else {
                statusBar.textContent = checked.length + ' מתוך ' + items.length + ' פריטים ברשותי';
                statusBar.className = 'status-bar complete';
            }
        }

        function submitCheck() {
            if (hasSubmittedToday()) {
                alert('כבר שלחת דיווח היום. ניתן לשלוח דיווח אחד ביום בלבד.');
                return;
            }

            var firstName = document.getElementById('firstName').value.trim();
            var lastName = document.getElementById('lastName').value.trim();

            if (!firstName || !lastName) {
                alert('יש להזין שם פרטי ושם משפחה');
                return;
            }

            var fullName = firstName + ' ' + lastName;
            var items = document.querySelectorAll('.checklist li');
            var checkedItems = [];
            var uncheckedItems = [];

            items.forEach(function(li) {
                var itemName = li.getAttribute('data-item');
                if (li.classList.contains('checked')) {
                    checkedItems.push(itemName);
                } else {
                    uncheckedItems.push(itemName);
                }
            });

            var entry = {
                name: fullName,
                date: getTodayKey(),
                time: formatTime(),
                checkedItems: checkedItems,
                uncheckedItems: uncheckedItems
            };

            // Send to Google Sheets
            if (SCRIPT_URL) {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
            }

            // Save locally
            entry.dateDisplay = formatDate();
            var history = JSON.parse(localStorage.getItem('equipmentHistory') || '[]');
            history.unshift(entry);
            if (history.length > 50) history = history.slice(0, 50);
            localStorage.setItem('equipmentHistory', JSON.stringify(history));
            localStorage.setItem('lastSubmitDate', getTodayKey());

            var msg = 'הצהרה נשלחה עבור ' + fullName + '\n';
            msg += 'ראיתי: ' + (checkedItems.length > 0 ? checkedItems.join(', ') : 'אף פריט');
            if (uncheckedItems.length > 0) {
                msg += '\nלא ברשותי: ' + uncheckedItems.join(', ');
            }
            alert(msg);

            checkIfAlreadySubmitted();
            loadHistory();
        }

        function loadHistory() {
            var history = JSON.parse(localStorage.getItem('equipmentHistory') || '[]');
            var container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = '<p style="color:#666; font-size:0.9rem;">אין דיווחים עדיין</p>';
                return;
            }

            var html = '';
            history.slice(0, 10).forEach(function(entry) {
                html += '<div class="history-entry">';
                html += '<div class="entry-header">';
                html += '<span class="entry-name">' + entry.name + '</span>';
                html += '<span class="entry-time">' + entry.time + ' | ' + entry.date + '</span>';
                html += '</div>';
                html += '<div class="entry-items">ראה: ' + (entry.checkedItems.length > 0 ? entry.checkedItems.join(', ') : 'אף פריט') + '</div>';
                if (entry.uncheckedItems && entry.uncheckedItems.length > 0) {
                    html += '<div class="entry-missing">לא ברשותו: ' + entry.uncheckedItems.join(', ') + '</div>';
                }
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function clearHistory() {
            if (confirm('למחוק את כל ההיסטוריה?')) {
                localStorage.clear();
                loadHistory();
                updateStatus();
            }
        }

        checkIfAlreadySubmitted();
        loadHistory();
    </script>
</body>
</html>
